<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Purple background circle -->
  <circle cx="128" cy="128" r="128" fill="#2D1B69"/>
  
  <!-- White document/note icon -->
  <g transform="translate(128, 128)">
    <!-- Document shape -->
    <path d="M -30 -40 L -30 50 Q -30 60 -20 60 L 40 60 Q 50 60 50 50 L 50 -30 Q 50 -40 40 -40 Z" fill="white"/>
    
    <!-- Lines on document -->
    <line x1="-15" y1="-20" x2="30" y2="-20" stroke="#2D1B69" stroke-width="4" stroke-linecap="round"/>
    <line x1="-15" y1="0" x2="30" y2="0" stroke="#2D1B69" stroke-width="4" stroke-linecap="round"/>
    <line x1="-15" y1="20" x2="30" y2="20" stroke="#2D1B69" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>